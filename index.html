<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>问春风</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --paper-bg: #f8f5f0;
            --paper-dark: #e8e0d0;
            --ink-black: #2c2c2c;
            --ink-light: #5a5a5a;
            --red-accent: #8b3a3a;
            --gold-accent: #b8860b;
            --seal-red: #c41e3a;
            --spring-green: #7a9e7a;
            --spring-pink: #d4a5a5;
            --willow-green: #6b8e6b;
        }

        body {
            font-family: 'Noto Serif SC', 'ZCOOL XiaoWei', serif;
            background: linear-gradient(180deg, #f8f5f0 0%, #f5f0e6 50%, #f8f5f0 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 宣纸纹理背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* 花瓣飘落动画 */
        .petals-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .petal {
            position: absolute;
            top: -20px;
            opacity: 0.6;
            animation: petal-fall linear infinite;
        }

        @keyframes petal-fall {
            0% {
                transform: translateY(-20px) rotate(0deg) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(100vh) rotate(720deg) translateX(100px);
                opacity: 0;
            }
        }

        /* 水墨山水背景 */
        .ink-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .ink-bg .mountain {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to top, 
                rgba(44, 44, 44, 0.06) 0%,
                rgba(44, 44, 44, 0.02) 30%,
                transparent 100%);
            clip-path: polygon(
                0% 100%, 5% 70%, 15% 85%, 25% 50%, 35% 65%, 
                45% 40%, 55% 60%, 65% 35%, 75% 55%, 85% 30%, 
                95% 50%, 100% 70%, 100% 100%
            );
        }

        .ink-bg .cloud {
            position: absolute;
            background: radial-gradient(ellipse, 
                rgba(44, 44, 44, 0.04) 0%,
                transparent 70%);
            border-radius: 50%;
            animation: float-cloud 20s ease-in-out infinite;
        }

        .ink-bg .cloud:nth-child(1) { width: 300px; height: 100px; top: 10%; left: -50px; animation-delay: 0s; }
        .ink-bg .cloud:nth-child(2) { width: 250px; height: 80px; top: 20%; right: -30px; animation-delay: -7s; }
        .ink-bg .cloud:nth-child(3) { width: 200px; height: 60px; top: 35%; left: 20%; animation-delay: -14s; }

        @keyframes float-cloud {
            0%, 100% { transform: translateX(0) translateY(0); opacity: 0.5; }
            50% { transform: translateX(20px) translateY(-10px); opacity: 0.7; }
        }

        /* 核心文案展示 */
        .core-poem {
            text-align: center;
            padding: 50px 20px 30px;
            position: relative;
        }

        .core-poem .poem-text {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.6rem;
            color: var(--ink-black);
            letter-spacing: 0.15em;
            line-height: 2.2;
            opacity: 0;
            animation: fadeInUp 1.5s ease-out forwards;
            animation-delay: 0.5s;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .core-poem .poem-divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--spring-green), transparent);
            margin: 20px auto;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
            animation-delay: 1s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .core-poem .poem-subtitle {
            font-size: 0.95rem;
            color: var(--ink-light);
            letter-spacing: 0.3em;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
            animation-delay: 1.2s;
        }

        /* 标题 */
        .title {
            text-align: center;
            padding: 20px 0 30px;
            position: relative;
        }

        .title h1 {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 3.2rem;
            color: var(--ink-black);
            letter-spacing: 0.3em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            position: relative;
            display: inline-block;
            opacity: 0;
            animation: fadeInUp 1s ease-out forwards;
            animation-delay: 0.8s;
        }

        .title h1::before {
            content: '𓍯';
            position: absolute;
            left: -40px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.5rem;
            color: var(--willow-green);
            opacity: 0.7;
        }

        .title h1::after {
            content: '𓍯';
            position: absolute;
            right: -40px;
            top: 50%;
            transform: translateY(-50%) scaleX(-1);
            font-size: 1.5rem;
            color: var(--willow-green);
            opacity: 0.7;
        }

        .title .subtitle {
            font-size: 0.9rem;
            color: var(--ink-light);
            margin-top: 10px;
            letter-spacing: 0.4em;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
            animation-delay: 1.3s;
        }

        /* 首页表单 */
        .input-section {
            background: linear-gradient(135deg, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.4) 100%);
            border: 1px solid rgba(107, 142, 107, 0.2);
            border-radius: 8px;
            padding: 30px;
            margin: 20px 0;
            box-shadow: 
                0 4px 20px rgba(0,0,0,0.05),
                inset 0 1px 0 rgba(255,255,255,0.8);
            position: relative;
        }

        .input-section::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 20px;
            right: 20px;
            height: 3px;
            background: linear-gradient(90deg, 
                transparent, 
                var(--spring-green), 
                transparent);
            opacity: 0.5;
        }

        .input-label {
            display: block;
            font-size: 1.1rem;
            color: var(--ink-black);
            margin-bottom: 15px;
            text-align: center;
            letter-spacing: 0.2em;
        }

        .question-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.1rem;
            font-family: 'Noto Serif SC', serif;
            border: 2px solid rgba(107, 142, 107, 0.3);
            border-radius: 8px;
            background: rgba(255,255,255,0.8);
            color: var(--ink-black);
            transition: all 0.3s ease;
            text-align: center;
        }

        .question-input:focus {
            outline: none;
            border-color: var(--spring-green);
            background: rgba(255,255,255,1);
            box-shadow: 0 0 20px rgba(122, 158, 122, 0.15);
        }

        .question-input::placeholder {
            color: var(--ink-light);
            opacity: 0.6;
        }

        .问春风-btn {
            width: 100%;
            padding: 18px 30px;
            margin-top: 25px;
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.8rem;
            letter-spacing: 0.5em;
            color: var(--paper-bg);
            background: linear-gradient(135deg, var(--willow-green) 0%, #5a7a5a 100%);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .问春风-btn::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            right: 2px;
            bottom: 2px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
        }

        .问春风-btn::after {
            content: '🍃';
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            opacity: 0.7;
        }

        .问春风-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(107, 142, 107, 0.4);
        }

        .问春风-btn:active {
            transform: translateY(0);
        }

        .问春风-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* 摇签动画区域 */
        .shake-container {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 0;
            position: relative;
        }

        .shake-container.active {
            display: flex;
        }

        /* 签筒和柳枝 */
        .tube-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 柳枝装饰 */
        .willow-branch {
            position: absolute;
            font-size: 2.5rem;
            color: var(--willow-green);
            opacity: 0.6;
            animation: sway 3s ease-in-out infinite;
        }

        .willow-branch.left {
            left: -50px;
            top: 20px;
            transform-origin: bottom center;
        }

        .willow-branch.right {
            right: -50px;
            top: 20px;
            transform-origin: bottom center;
            transform: scaleX(-1);
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        .willow-branch.left {
            animation-name: sway-left;
        }

        @keyframes sway-left {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(3deg); }
        }

        .willow-branch.right {
            animation-name: sway-right;
        }

        @keyframes sway-right {
            0%, 100% { transform: scaleX(-1) rotate(-5deg); }
            50% { transform: scaleX(-1) rotate(3deg); }
        }

        /* 签筒 SVG */
        .shake-tube {
            width: 120px;
            height: 200px;
            position: relative;
            animation: shake-tube-animation 2.5s ease-in-out;
        }

        @keyframes shake-tube-animation {
            0% { transform: rotate(0deg); }
            10% { transform: rotate(-15deg); }
            20% { transform: rotate(12deg); }
            30% { transform: rotate(-10deg); }
            40% { transform: rotate(8deg); }
            50% { transform: rotate(-6deg); }
            60% { transform: rotate(5deg); }
            70% { transform: rotate(-3deg); }
            80% { transform: rotate(2deg); }
            90% { transform: rotate(-1deg); }
            95% { transform: rotate(0deg) translateY(0); }
            100% { transform: rotate(0deg) translateY(30px); }
        }

        /* 掉出的签 */
        .falling-stick {
            position: absolute;
            width: 30px;
            height: 80px;
            background: linear-gradient(to right, #d4c4a8 0%, #e8dcc8 50%, #d4c4a8 100%);
            border-radius: 3px;
            left: 50%;
            transform: translateX(-50%);
            top: -100px;
            opacity: 0;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }

        .falling-stick.visible {
            animation: stick-fall 0.8s ease-out forwards;
            animation-delay: 2.3s;
        }

        @keyframes stick-fall {
            0% { top: -100px; opacity: 0; }
            20% { top: -80px; opacity: 1; }
            100% { top: 250px; opacity: 1; }
        }

        .falling-stick::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 5px;
            right: 5px;
            bottom: 10px;
            background: var(--spring-green);
            opacity: 0.8;
            border-radius: 2px;
        }

        /* 结果展示 */
        .result-section {
            display: none;
            text-align: center;
            padding: 30px 0;
            animation: fadeIn 0.8s ease-out;
        }

        .result-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-question {
            font-size: 1.1rem;
            color: var(--ink-light);
            margin-bottom: 30px;
            padding: 15px;
            background: rgba(255,255,255,0.5);
            border-radius: 8px;
            letter-spacing: 0.1em;
        }

        .result-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 3rem;
            margin: 20px 0;
            letter-spacing: 0.2em;
        }

        .result-title.开干 { color: var(--gold-accent); }
        .result-title.再等等 { color: var(--spring-green); }
        .result-title.下次再来 { color: var(--spring-pink); }

        /* 水墨插图 */
        .ink-illustration {
            width: 280px;
            height: 180px;
            margin: 30px auto;
            position: relative;
        }

        /* 开干 - 春风拂柳/飞鸟 */
        .illustration-fly {
            background: linear-gradient(to top, 
                rgba(107, 142, 107, 0.1) 0%,
                transparent 40%);
            border-radius: 50%;
            position: relative;
        }

        .illustration-fly::before {
            content: '';
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, 
                rgba(184, 134, 11, 0.4) 0%,
                rgba(184, 134, 11, 0.1) 50%,
                transparent 70%);
            border-radius: 50%;
            animation: sun-rise 2s ease-out;
        }

        .illustration-fly .willows {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .illustration-fly .willow {
            position: absolute;
            font-size: 24px;
            animation: willow-sway 2s ease-in-out infinite;
        }

        .illustration-fly .willow:nth-child(1) { bottom: 30px; left: 30px; animation-delay: 0s; }
        .illustration-fly .willow:nth-child(2) { bottom: 30px; left: 80px; animation-delay: 0.3s; }
        .illustration-fly .willow:nth-child(3) { bottom: 30px; right: 30px; animation-delay: 0.6s; }

        @keyframes willow-sway {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
        }

        .illustration-fly .bird {
            position: absolute;
            font-size: 20px;
            animation: bird-fly 3s ease-in-out infinite;
        }

        .illustration-fly .bird:nth-child(4) { top: 30px; left: 60px; animation-delay: 0s; }
        .illustration-fly .bird:nth-child(5) { top: 50px; left: 100px; animation-delay: 0.5s; }
        .illustration-fly .bird:nth-child(6) { top: 40px; left: 140px; animation-delay: 1s; }

        @keyframes bird-fly {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.1); }
        }

        @keyframes sun-rise {
            from { transform: translateX(-50%) scale(0); opacity: 0; }
            to { transform: translateX(-50%) scale(1); opacity: 1; }
        }

        /* 再等等 - 春风酝酿/花开 */
        .illustration-wait {
            background: linear-gradient(to top, 
                rgba(90, 90, 90, 0.08) 0%,
                rgba(107, 142, 107, 0.1) 50%,
                transparent 100%);
            position: relative;
        }

        .illustration-wait .petals {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .illustration-wait .petal-anim {
            position: absolute;
            font-size: 16px;
            animation: petal-drift 4s ease-in-out infinite;
        }

        .illustration-wait .petal-anim:nth-child(1) { top: 20px; left: 40px; animation-delay: 0s; }
        .illustration-wait .petal-anim:nth-child(2) { top: 50px; left: 100px; animation-delay: 1s; }
        .illustration-wait .petal-anim:nth-child(3) { top: 30px; left: 160px; animation-delay: 2s; }

        @keyframes petal-drift {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.5; }
            50% { transform: translateY(10px) translateX(15px); opacity: 0.8; }
        }

        .illustration-wait .flower {
            position: absolute;
            font-size: 28px;
            animation: flower-bloom 3s ease-in-out infinite;
        }

        .illustration-wait .flower:nth-child(4) { bottom: 40px; left: 50%; transform: translateX(-50%); animation-delay: 0.5s; }

        @keyframes flower-bloom {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.1); }
        }

        .illustration-wait .bud {
            position: absolute;
            font-size: 18px;
            opacity: 0.6;
            animation: bud-swell 3s ease-in-out infinite;
        }

        .illustration-wait .bud:nth-child(5) { bottom: 50px; left: 30%; animation-delay: 0s; }
        .illustration-wait .bud:nth-child(6) { bottom: 50px; right: 30%; animation-delay: 1.5s; }

        @keyframes bud-swell {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.15); opacity: 0.8; }
        }

        /* 下次再来 - 春风未至/随本心 */
        .illustration-leave {
            background: linear-gradient(to top, 
                rgba(212, 165, 165, 0.1) 0%,
                transparent 60%);
            position: relative;
        }

        .illustration-leave .petals-fall {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .illustration-leave .petal-fall-anim {
            position: absolute;
            font-size: 14px;
            animation: fall-drift 4s ease-in-out infinite;
        }

        .illustration-leave .petal-fall-anim:nth-child(1) { top: 20px; left: 40px; animation-delay: 0s; }
        .illustration-leave .petal-fall-anim:nth-child(2) { top: 40px; left: 100px; animation-delay: 0.8s; }
        .illustration-leave .petal-fall-anim:nth-child(3) { top: 30px; left: 180px; animation-delay: 1.6s; }
        .illustration-leave .petal-fall-anim:nth-child(4) { top: 60px; left: 60px; animation-delay: 2.4s; }
        .illustration-leave .petal-fall-anim:nth-child(5) { top: 50px; left: 220px; animation-delay: 3.2s; }

        @keyframes fall-drift {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.7; }
            100% { transform: translateY(120px) rotate(180deg); opacity: 0.2; }
        }

        .illustration-leave .heart {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 32px;
            color: var(--spring-pink);
            animation: heart-beat 2s ease-in-out infinite;
        }

        @keyframes heart-beat {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.1); }
        }

        /* 签文 */
        .result-text {
            font-size: 1.1rem;
            line-height: 2;
            color: var(--ink-black);
            padding: 25px;
            margin: 20px 10px;
            background: 
                linear-gradient(135deg, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0.4) 100%);
            border-left: 3px solid var(--spring-green);
            letter-spacing: 0.1em;
            text-align: justify;
        }

        /* 点睛之笔 - 即随本心 */
        .heart-of-heart {
            margin: 30px 10px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(107, 142, 107, 0.1) 0%, rgba(212, 165, 165, 0.1) 100%);
            border-radius: 8px;
            position: relative;
        }

        .heart-of-heart::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--spring-green), transparent);
        }

        .heart-of-heart .main-text {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.4rem;
            color: var(--ink-black);
            letter-spacing: 0.2em;
            margin-bottom: 8px;
        }

        .heart-of-heart .sub-text {
            font-size: 0.9rem;
            color: var(--ink-light);
            letter-spacing: 0.15em;
            line-height: 1.8;
        }

        /* 印章效果 */
        .seal {
            width: 60px;
            height: 60px;
            margin: 30px auto;
            border: 3px solid var(--spring-green);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.5rem;
            color: var(--spring-green);
            transform: rotate(-5deg);
            opacity: 0.8;
        }

        /* 再来一次按钮 */
        .again-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 40px;
            font-family: 'Noto Serif SC', serif;
            font-size: 1rem;
            color: var(--ink-black);
            background: transparent;
            border: 2px solid var(--spring-green);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.2em;
        }

        .again-btn:hover {
            background: var(--spring-green);
            color: var(--paper-bg);
        }

        /* 历史记录 */
        .history-section {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid rgba(107, 142, 107, 0.2);
        }

        .history-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            font-size: 1rem;
            color: var(--ink-light);
            background: transparent;
            border: 1px solid rgba(107, 142, 107, 0.3);
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            font-family: 'Noto Serif SC', serif;
            letter-spacing: 0.2em;
        }

        .history-toggle:hover {
            background: rgba(107, 142, 107, 0.1);
            color: var(--ink-black);
        }

        .history-toggle .arrow {
            transition: transform 0.3s ease;
        }

        .history-toggle.active .arrow {
            transform: rotate(180deg);
        }

        .history-list {
            display: none;
            margin-top: 20px;
        }

        .history-list.active {
            display: block;
        }

        .history-item {
            background: rgba(255,255,255,0.5);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 3px solid var(--spring-green);
        }

        .history-item .time {
            font-size: 0.85rem;
            color: var(--ink-light);
            margin-bottom: 8px;
        }

        .history-item .question {
            font-size: 0.95rem;
            color: var(--ink-black);
            margin-bottom: 5px;
        }

        .history-item .result {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.3rem;
        }

        .history-item .result.开干 { color: var(--gold-accent); }
        .history-item .result.再等等 { color: var(--spring-green); }
        .history-item .result.下次再来 { color: var(--spring-pink); }

        .history-empty {
            text-align: center;
            color: var(--ink-light);
            padding: 30px;
            font-size: 0.95rem;
        }

        .clear-history {
            display: block;
            margin: 20px auto 0;
            padding: 10px 20px;
            font-size: 0.85rem;
            color: var(--ink-light);
            background: transparent;
            border: 1px solid rgba(107, 142, 107, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .clear-history:hover {
            border-color: var(--spring-pink);
            color: var(--spring-pink);
        }

        /* 页脚 */
        .footer {
            text-align: center;
            padding: 40px 0 30px;
            color: var(--ink-light);
            font-size: 0.85rem;
            opacity: 0.6;
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .core-poem .poem-text {
                font-size: 1.3rem;
                letter-spacing: 0.1em;
            }

            .title h1 {
                font-size: 2.5rem;
                letter-spacing: 0.2em;
            }

            .title h1::before,
            .title h1::after {
                font-size: 1.2rem;
            }

            .title h1::before { left: -35px; }
            .title h1::after { right: -35px; }

            .input-section {
                padding: 20px;
            }

            .问春风-btn {
                font-size: 1.5rem;
                padding: 15px 20px;
            }

            .result-title {
                font-size: 2.5rem;
            }

            .ink-illustration {
                width: 240px;
                height: 150px;
            }

            .willow-branch {
                font-size: 2rem;
            }

            .willow-branch.left { left: -40px; }
            .willow-branch.right { right: -40px; }
        }

        /* 隐藏类 */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- 花瓣飘落 -->
    <div class="petals-container" id="petalsContainer"></div>

    <!-- 水墨背景 -->
    <div class="ink-bg">
        <div class="cloud"></div>
        <div class="cloud"></div>
        <div class="cloud"></div>
        <div class="mountain"></div>
    </div>

    <div class="container">
        <!-- 核心文案 -->
        <div class="core-poem">
            <p class="poem-text">遇事不决 可问春风</p>
            <p class="poem-text">春风不语 即随本心</p>
            <div class="poem-divider"></div>
            <p class="poem-subtitle">心诚则灵</p>
        </div>

        <!-- 标题 -->
        <div class="title" id="title">
            <h1>问春风</h1>
        </div>

        <!-- 输入区域 -->
        <div class="input-section" id="inputSection">
            <label class="input-label">心中默念所问之事</label>
            <input 
                type="text" 
                class="question-input" 
                id="questionInput" 
                placeholder="春风倾听一切…"
                maxlength="100"
            >
            <button class="问春风-btn" id="问春风Btn">问春风</button>
        </div>

        <!-- 摇签动画 -->
        <div class="shake-container" id="shakeContainer">
            <div class="tube-wrapper">
                <span class="willow-branch left">𓍯</span>
                <svg class="shake-tube" viewBox="0 0 120 200" id="shakeTube">
                    <!-- 签筒主体 -->
                    <defs>
                        <linearGradient id="tubeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:#8b4513"/>
                            <stop offset="30%" style="stop-color:#a0522d"/>
                            <stop offset="70%" style="stop-color:#8b4513"/>
                            <stop offset="100%" style="stop-color:#654321"/>
                        </linearGradient>
                        <linearGradient id="tubeTop" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#deb887"/>
                            <stop offset="100%" style="stop-color:#a0522d"/>
                        </linearGradient>
                    </defs>
                    
                    <!-- 筒身 -->
                    <rect x="15" y="50" width="90" height="130" rx="5" fill="url(#tubeGrad)" stroke="#5d3a1a" stroke-width="2"/>
                    
                    <!-- 筒身装饰线 -->
                    <line x1="20" y1="70" x2="100" y2="70" stroke="#654321" stroke-width="1" opacity="0.5"/>
                    <line x1="20" y1="170" x2="100" y2="170" stroke="#654321" stroke-width="1" opacity="0.5"/>
                    
                    <!-- 筒口 -->
                    <ellipse cx="60" cy="50" rx="45" ry="15" fill="url(#tubeTop)" stroke="#5d3a1a" stroke-width="2"/>
                    
                    <!-- 签 -->
                    <g id="sticks">
                        <rect x="25" y="30" width="8" height="50" rx="2" fill="#f5f0e6" stroke="#d4c4a8" transform="rotate(-8 29 55)"/>
                        <rect x="40" y="25" width="8" height="55" rx="2" fill="#f5f0e6" stroke="#d4c4a8" transform="rotate(-3 44 52)"/>
                        <rect x="55" y="23" width="8" height="57" rx="2" fill="#f5f0e6" stroke="#d4c4a8"/>
                        <rect x="70" y="25" width="8" height="55" rx="2" fill="#f5f0e6" stroke="#d4c4a8" transform="rotate(3 74 52)"/>
                        <rect x="85" y="30" width="8" height="50" rx="2" fill="#f5f0e6" stroke="#d4c4a8" transform="rotate(8 89 55)"/>
                    </g>
                    
                    <!-- 筒底 -->
                    <ellipse cx="60" cy="180" rx="40" ry="12" fill="#654321" stroke="#5d3a1a" stroke-width="2"/>
                </svg>
                <span class="willow-branch right">𓍯</span>
                <div class="falling-stick" id="fallingStick"></div>
            </div>
        </div>

        <!-- 结果展示 -->
        <div class="result-section" id="resultSection">
            <p class="result-question" id="resultQuestion"></p>
            
            <h2 class="result-title" id="resultTitle"></h2>
            
            <div class="ink-illustration" id="illustration"></div>
            
            <p class="result-text" id="resultText"></p>

            <!-- 即随本心 点睛 -->
            <div class="heart-of-heart">
                <p class="main-text">即随本心</p>
                <p class="sub-text">春风已语，或春风不语<br>无论如何，跟随你心</p>
            </div>
            
            <div class="seal" id="seal"></div>
            
            <button class="again-btn" id="againBtn">再问春风</button>
        </div>

        <!-- 历史记录 -->
        <div class="history-section" id="historySection">
            <button class="history-toggle" id="historyToggle">
                <span>往期春风</span>
                <span class="arrow">▼</span>
            </button>
            
            <div class="history-list" id="historyList"></div>
        </div>

        <div class="footer">
            问春风 · 即随本心
        </div>
    </div>

    <script>
        // 创建花瓣飘落动画
        function createPetals() {
            const container = document.getElementById('petalsContainer');
            const petalChars = ['🌸', '🍃', '✿', '❀'];
            
            for (let i = 0; i < 15; i++) {
                const petal = document.createElement('span');
                petal.className = 'petal';
                petal.textContent = petalChars[Math.floor(Math.random() * petalChars.length)];
                petal.style.left = Math.random() * 100 + '%';
                petal.style.fontSize = (Math.random() * 10 + 12) + 'px';
                petal.style.animationDuration = (Math.random() * 5 + 8) + 's';
                petal.style.animationDelay = (Math.random() * 10) + 's';
                petal.style.opacity = Math.random() * 0.4 + 0.3;
                container.appendChild(petal);
            }
        }

        // 签文数据 - 围绕"问春风→随本心"主题
        const fortunes = [
            {
                title: '开干',
                text: '春风已至，万物复苏。此签寓意春风吹散了迷雾，前路清晰可见。东风已备，当趁势而行，莫负春光，莫负己心。放手去做，春风与你同行。',
                illustration: 'fly',
                seal: '行'
            },
            {
                title: '再等等',
                text: '春风正在酝酿，花期尚未到来。此签寓意时机仍在等待之中，春芽正蓄势待发。静候不是消极，而是懂得顺应天时。待到花开时，春风自会相迎。',
                illustration: 'wait',
                seal: '待'
            },
            {
                title: '下次再来',
                text: '春风未至，但本心或许已有答案。此签并非拒绝，而是提醒：有些事无需外求，问心便已知晓。退去执念，静观本心，答案或许早已在心中。',
                illustration: 'leave',
                seal: '心'
            }
        ];

        // DOM元素
        const inputSection = document.getElementById('inputSection');
        const questionInput = document.getElementById('questionInput');
        const 问春风Btn = document.getElementById('问春风Btn');
        const shakeContainer = document.getElementById('shakeContainer');
        const shakeTube = document.getElementById('shakeTube');
        const fallingStick = document.getElementById('fallingStick');
        const resultSection = document.getElementById('resultSection');
        const resultQuestion = document.getElementById('resultQuestion');
        const resultTitle = document.getElementById('resultTitle');
        const illustration = document.getElementById('illustration');
        const resultText = document.getElementById('resultText');
        const seal = document.getElementById('seal');
        const againBtn = document.getElementById('againBtn');
        const historyToggle = document.getElementById('historyToggle');
        const historyList = document.getElementById('historyList');
        const historySection = document.getElementById('historySection');

        // 历史记录管理
        const MAX_HISTORY = 20;

        function getHistory() {
            try {
                return JSON.parse(localStorage.getItem('fortuneHistory')) || [];
            } catch {
                return [];
            }
        }

        function saveHistory(record) {
            let history = getHistory();
            history.unshift(record);
            if (history.length > MAX_HISTORY) {
                history = history.slice(0, MAX_HISTORY);
            }
            localStorage.setItem('fortuneHistory', JSON.stringify(history));
            saveToCloud(history);
        }

        // ========== GitHub 云同步 ==========
        const GH_CFG = {
            token: ['ghp_Rzdf','y8BD199F42m4a3','ths61XZU5f5n0EEduF'].join(''),
            repo: 'ebupuba099-lang/chouqian',
            path: 'data/fortune_data.json'
        };

        async function loadFromCloud() {
            try {
                const resp = await fetch(`https://api.github.com/repos/${GH_CFG.repo}/contents/${GH_CFG.path}`, {
                    headers: { 'Authorization': `token ${GH_CFG.token}`, 'Accept': 'application/vnd.github.v3.raw' }
                });
                if (resp.ok) {
                    const cloud = await resp.json();
                    const local = getHistory();
                    // 合并：云端+本地，去重（按时间戳），最多MAX_HISTORY条
                    const all = [...cloud.history || [], ...local];
                    const seen = new Set();
                    const merged = all.filter(item => {
                        const key = item.time + item.question;
                        if (seen.has(key)) return false;
                        seen.add(key);
                        return true;
                    }).slice(0, MAX_HISTORY);
                    localStorage.setItem('fortuneHistory', JSON.stringify(merged));
                    return merged;
                }
            } catch (e) {
                console.log('云数据加载失败:', e);
            }
            return null;
        }

        let cloudSaving = false;
        async function saveToCloud(history) {
            if (cloudSaving) return;
            cloudSaving = true;
            try {
                // 获取当前文件SHA
                const shaResp = await fetch(`https://api.github.com/repos/${GH_CFG.repo}/contents/${GH_CFG.path}`, {
                    headers: { 'Authorization': `token ${GH_CFG.token}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                if (!shaResp.ok) { cloudSaving = false; return; }
                const sha = (await shaResp.json()).sha;
                const data = { history: history, lastUpdate: Date.now() };
                const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
                await fetch(`https://api.github.com/repos/${GH_CFG.repo}/contents/${GH_CFG.path}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${GH_CFG.token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: 'auto: sync fortune history', content: encoded, sha: sha })
                });
            } catch (e) {
                console.log('云保存失败:', e);
            }
            cloudSaving = false;
        }

        function renderHistory() {
            const history = getHistory();
            
            if (history.length === 0) {
                historyList.innerHTML = '<p class="history-empty">暂无问春风记录</p>';
                return;
            }

            historyList.innerHTML = history.map((item, index) => `
                <div class="history-item">
                    <p class="time">${item.time}</p>
                    <p class="question">${item.question}</p>
                    <p class="result ${item.result}">${item.result}</p>
                </div>
            `).join('') + '<button class="clear-history" onclick="clearHistory()">清空记录</button>';
        }

        function clearHistory() {
            localStorage.removeItem('fortuneHistory');
            renderHistory();
        }

        // 生成插图HTML
        function getIllustrationHTML(type) {
            switch(type) {
                case 'fly':
                    return `
                        <div class="illustration-fly">
                            <div class="willows">
                                <span class="willow">𓍯</span>
                                <span class="willow">𓍯</span>
                                <span class="willow">𓍯</span>
                            </div>
                            <div class="birds">
                                <span class="bird">𓅰</span>
                                <span class="bird">𓅰</span>
                                <span class="bird">𓅰</span>
                            </div>
                        </div>
                    `;
                case 'wait':
                    return `
                        <div class="illustration-wait">
                            <div class="petals">
                                <span class="petal-anim">🌸</span>
                                <span class="petal-anim">🍃</span>
                                <span class="petal-anim">✿</span>
                            </div>
                            <span class="flower">🌺</span>
                            <span class="bud">🌷</span>
                            <span class="bud">🌷</span>
                        </div>
                    `;
                case 'leave':
                    return `
                        <div class="illustration-leave">
                            <div class="petals-fall">
                                <span class="petal-fall-anim">🌸</span>
                                <span class="petal-fall-anim">🍃</span>
                                <span class="petal-fall-anim">🌸</span>
                                <span class="petal-fall-anim">🍃</span>
                                <span class="petal-fall-anim">🌸</span>
                            </div>
                            <span class="heart">♥</span>
                        </div>
                    `;
                default:
                    return '';
            }
        }

        // 求签流程
        function startDrawing() {
            const question = questionInput.value.trim();
            
            if (!question) {
                questionInput.focus();
                questionInput.style.borderColor = 'var(--spring-pink)';
                setTimeout(() => {
                    questionInput.style.borderColor = 'rgba(107, 142, 107, 0.3)';
                }, 1000);
                return;
            }

            // 禁用按钮
            问春风Btn.disabled = true;
            questionInput.disabled = true;

            // 隐藏输入区域，显示动画
            inputSection.classList.add('hidden');
            shakeContainer.classList.add('active');

            // 随机选择结果
            const fortune = fortunes[Math.floor(Math.random() * fortunes.length)];

            // 动画结束后显示结果
            const animationDuration = 3000;
            
            setTimeout(() => {
                // 显示掉落动画
                fallingStick.classList.add('visible');
            }, 2300);

            setTimeout(() => {
                // 显示结果
                shakeContainer.classList.remove('active');
                fallingStick.classList.remove('visible');
                
                // 重置签筒动画
                shakeTube.style.animation = 'none';
                shakeTube.offsetHeight; // 触发重排
                shakeTube.style.animation = '';

                // 显示结果区域
                resultSection.classList.add('active');
                resultQuestion.textContent = `「${question}」`;
                resultTitle.textContent = fortune.title;
                resultTitle.className = `result-title ${fortune.title}`;
                illustration.innerHTML = getIllustrationHTML(fortune.illustration);
                resultText.textContent = fortune.text;
                seal.textContent = fortune.seal;

                // 保存历史记录
                const now = new Date();
                const timeStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
                
                saveHistory({
                    question: question,
                    result: fortune.title,
                    time: timeStr
                });

                // 重新启用输入
                问春风Btn.disabled = false;
                questionInput.disabled = false;

                // 滚动到结果
                resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });

            }, animationDuration);
        }

        // 重置到初始状态
        function resetToStart() {
            resultSection.classList.remove('active');
            inputSection.classList.remove('hidden');
            questionInput.value = '';
            questionInput.focus();
            
            // 滚动到顶部
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 事件绑定
        问春风Btn.addEventListener('click', startDrawing);

        questionInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                startDrawing();
            }
        });

        againBtn.addEventListener('click', resetToStart);

        historyToggle.addEventListener('click', () => {
            historyToggle.classList.toggle('active');
            historyList.classList.toggle('active');
            if (historyList.classList.contains('active')) {
                renderHistory();
            }
        });

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', async () => {
            createPetals();
            await loadFromCloud();
            renderHistory();
            questionInput.focus();
        });
    </script>
</body>
</html>
